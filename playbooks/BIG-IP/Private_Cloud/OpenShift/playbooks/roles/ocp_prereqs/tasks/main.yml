---
# Role: ocp_prereqs
# Creates: namespace, service account, SCC binding, and Multus NADs for all 4 VLANs
# Auth: kubernetes.core.k8s reads K8S_AUTH_HOST + K8S_AUTH_API_KEY
#       injected by AAP's "OpenShift or Kubernetes API" credential.
#       No kubeconfig reference anywhere in this role.

- name: Create F5 namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp_namespace }}"
        labels:
          app: f5-bigip

- name: Create service account for F5 VM
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: f5-bigip-sa
        namespace: "{{ ocp_namespace }}"

- name: Create privileged SCC binding for F5 service account
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "f5-bigip-privileged-{{ ocp_namespace }}"
      subjects:
        - kind: ServiceAccount
          name: f5-bigip-sa
          namespace: "{{ ocp_namespace }}"
      roleRef:
        kind: ClusterRole
        name: system:openshift:scc:privileged
        apiGroup: rbac.authorization.k8s.io

- name: Create NetworkAttachmentDefinition for each VLAN
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'multus_nad.j2') | from_yaml }}"
  loop: "{{ f5_networks }}"
  loop_control:
    loop_var: nad_item
    label: "{{ nad_item.name }} VLAN {{ nad_item.vlan_id }}"

- name: Verify CDI is available
  kubernetes.core.k8s_info:
    api_version: cdi.kubevirt.io/v1beta1
    kind: CDIConfig
    name: config
  register: cdi_check
  failed_when: cdi_check.resources | length == 0

- name: Display CDI upload proxy URL
  ansible.builtin.debug:
    msg: "CDI upload proxy: {{ cdi_check.resources[0].status.uploadProxyURL }}"

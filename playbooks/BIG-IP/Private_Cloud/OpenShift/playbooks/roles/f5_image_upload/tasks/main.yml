---

# Role: f5_image_upload
# Auth for k8s tasks: K8S_AUTH_* env vars from AAP credential (no kubeconfig).
# Auth for virtctl on bastion: temp kubeconfig written at runtime from the
# same K8S_AUTH_* env vars, used once, then deleted.
# Idempotent: skips upload if DataVolume already exists and is Succeeded.


# PreTasks
- name: Get KubeVirt version from cluster
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: KubeVirt
    name: kubevirt
    namespace: openshift-cnv
  register: kubevirt_info
  delegate_to: localhost

- name: Set virtctl version fact
  ansible.builtin.set_fact:
    virtctl_version: "{{ kubevirt_info.resources[0].status.observedKubeVirtVersion }}"

- name: Check virtctl is installed on bastion
  ansible.builtin.stat:
    path: /usr/local/bin/virtctl
  register: virtctl_stat
  delegate_to: bastion01

- name: Download virtctl on bastion if missing
  ansible.builtin.get_url:
    url: "https://github.com/kubevirt/kubevirt/releases/download/{{ virtctl_version }}/virtctl-{{ virtctl_version }}-linux-amd64"
    dest: /usr/local/bin/virtctl
    mode: '0755'
  become: true
  delegate_to: bastion01
  when: not virtctl_stat.stat.exists

- name: Verify virtctl works
  ansible.builtin.command: virtctl version --client
  delegate_to: bastion01
  register: virtctl_ver_check
  changed_when: false

- name: Display virtctl version
  ansible.builtin.debug:
    msg: "virtctl installed: {{ virtctl_ver_check.stdout }}"

# Post

- name: Check if DataVolume already exists and succeeded
  kubernetes.core.k8s_info:
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ f5_datavolume_name }}"
    namespace: "{{ ocp_namespace }}"
  register: dv_check

- name: Set upload_needed fact
  ansible.builtin.set_fact:
    upload_needed: >-
      {{
        dv_check.resources | length == 0 or
        (dv_check.resources[0].status.phase | default('')) != 'Succeeded'
      }}

- name: Image upload block
  when: upload_needed
  block:

    # ------------------------------------------------------------------
    # Bastion prerequisites
    # ------------------------------------------------------------------

    - name: Ensure cifs-utils is installed on bastion
      ansible.builtin.package:
        name: cifs-utils
        state: present
      become: true
      delegate_to: bastion01

    - name: Check virtctl is installed on bastion
      ansible.builtin.stat:
        path: /usr/local/bin/virtctl
      register: virtctl_stat
      delegate_to: bastion01

    - name: Fail with install instructions if virtctl missing
      ansible.builtin.fail:
        msg: >
          virtctl not found at /usr/local/bin/virtctl on bastion01.
          Install matching your OCP KubeVirt version:
            VERSION=$(oc get kubevirt kubevirt -n openshift-cnv
              -o jsonpath='{.status.observedKubeVirtVersion}')
            curl -Lo /usr/local/bin/virtctl
              https://github.com/kubevirt/kubevirt/releases/download/${VERSION}/virtctl-${VERSION}-linux-amd64
            chmod +x /usr/local/bin/virtctl
      when: not virtctl_stat.stat.exists

    # ------------------------------------------------------------------
    # CIFS mount on bastion
    # ------------------------------------------------------------------

    - name: Create CIFS mount point on bastion
      ansible.builtin.file:
        path: "{{ cifs_mountpoint }}"
        state: directory
        mode: '0755'
      become: true
      delegate_to: bastion01

    - name: Mount CIFS share on bastion
      ansible.posix.mount:
        src: "{{ cifs_share }}"
        path: "{{ cifs_mountpoint }}"
        fstype: cifs
        opts: "username={{ cifs_username }},password={{ cifs_password }},domain={{ cifs_domain }},uid=0,gid=0,file_mode=0644,dir_mode=0755"
        state: mounted
      become: true
      delegate_to: bastion01

    - name: Verify QCOW2 exists on share
      ansible.builtin.stat:
        path: "{{ cifs_mountpoint }}/{{ qcow2_filename }}"
      register: qcow2_stat
      delegate_to: bastion01
      failed_when: not qcow2_stat.stat.exists

    # ------------------------------------------------------------------
    # Get CDI upload proxy URL (uses K8S_AUTH_* env vars automatically)
    # ------------------------------------------------------------------

    - name: Get CDI upload proxy URL
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: CDIConfig
        name: config
      register: cdi_config

    - name: Set CDI upload proxy fact
      ansible.builtin.set_fact:
        cdi_upload_proxy: "{{ cdi_config.resources[0].status.uploadProxyURL }}"

    # ------------------------------------------------------------------
    # Create DataVolume upload target (uses K8S_AUTH_* env vars)
    # ------------------------------------------------------------------

    - name: Create DataVolume upload target
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cdi.kubevirt.io/v1beta1
          kind: DataVolume
          metadata:
            name: "{{ f5_datavolume_name }}"
            namespace: "{{ ocp_namespace }}"
            annotations:
              cdi.kubevirt.io/storage.upload.target: ""
          spec:
            source:
              upload: {}
            storage:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: "{{ f5_disk_size }}"
              storageClassName: "{{ f5_storage_class }}"

    - name: Wait for DataVolume to be ready for upload
      kubernetes.core.k8s_info:
        api_version: cdi.kubevirt.io/v1beta1
        kind: DataVolume
        name: "{{ f5_datavolume_name }}"
        namespace: "{{ ocp_namespace }}"
      register: dv_upload_ready
      until: >
        dv_upload_ready.resources[0].status.phase | default('') in ['UploadReady', 'WaitForFirstConsumer']
      retries: 20
      delay: 10

    # ------------------------------------------------------------------
    # Build temp kubeconfig on bastion from AAP-injected env vars.
    # K8S_AUTH_HOST and K8S_AUTH_API_KEY are set in the EE at runtime
    # by the AAP "OpenShift or Kubernetes API" credential type.
    # We look them up here (in the EE) and write to the bastion as a
    # temp file so virtctl can authenticate. Deleted immediately after.
    # ------------------------------------------------------------------

    - name: Set temp kubeconfig path
      ansible.builtin.set_fact:
        tmp_kubeconfig: "/tmp/.virtctl-kubeconfig-{{ ansible_date_time.epoch }}"

    - name: Write temp kubeconfig on bastion from AAP-injected token
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: "{{ lookup('env', 'K8S_AUTH_HOST') }}"
              insecure-skip-tls-verify: true
            name: ocp-cluster
          contexts:
          - context:
              cluster: ocp-cluster
              user: aap-sa
            name: ocp-context
          current-context: ocp-context
          users:
          - name: aap-sa
            user:
              token: "{{ lookup('env', 'K8S_AUTH_API_KEY') }}"
        dest: "{{ tmp_kubeconfig }}"
        mode: '0600'
      delegate_to: bastion01
      no_log: true

    # ------------------------------------------------------------------
    # virtctl upload — delegated to bastion, temp kubeconfig auth
    # ------------------------------------------------------------------

    - name: Upload QCOW2 via virtctl image-upload
      ansible.builtin.shell: >
        virtctl image-upload dv {{ f5_datavolume_name }}
        --namespace {{ ocp_namespace }}
        --image-path {{ cifs_mountpoint }}/{{ qcow2_filename }}
        --uploadproxy-url {{ cdi_upload_proxy }}
        --kubeconfig {{ tmp_kubeconfig }}
        --insecure
        --wait-secs=600
      delegate_to: bastion01
      register: upload_result
      changed_when: upload_result.rc == 0

  always:
    # ------------------------------------------------------------------
    # Cleanup — runs whether upload succeeded or failed
    # ------------------------------------------------------------------

    - name: Remove temp kubeconfig from bastion
      ansible.builtin.file:
        path: "{{ tmp_kubeconfig }}"
        state: absent
      delegate_to: bastion01
      when: tmp_kubeconfig is defined

    - name: Unmount CIFS share on bastion
      ansible.posix.mount:
        path: "{{ cifs_mountpoint }}"
        state: unmounted
      become: true
      delegate_to: bastion01

- name: Wait for DataVolume to reach Succeeded phase
  kubernetes.core.k8s_info:
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ f5_datavolume_name }}"
    namespace: "{{ ocp_namespace }}"
  register: dv_status
  until: dv_status.resources[0].status.phase | default('') == 'Succeeded'
  retries: 60
  delay: 30
  failed_when: dv_status.resources[0].status.phase | default('') == 'Failed'

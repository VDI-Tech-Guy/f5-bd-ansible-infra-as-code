---
# Role: f5_vm_deploy
# Auth: kubernetes.core.k8s reads K8S_AUTH_* env vars from AAP credential.
# Clones DataVolume per node, creates cloud-init secret, deploys VM CR.

- name: Clone DataVolume for this node
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: "{{ f5_datavolume_name }}-{{ node_name }}"
        namespace: "{{ ocp_namespace }}"
      spec:
        source:
          pvc:
            namespace: "{{ ocp_namespace }}"
            name: "{{ f5_datavolume_name }}"
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "{{ f5_disk_size }}"
          storageClassName: "{{ f5_storage_class }}"

- name: Wait for cloned DataVolume to succeed
  kubernetes.core.k8s_info:
    api_version: cdi.kubevirt.io/v1beta1
    kind: DataVolume
    name: "{{ f5_datavolume_name }}-{{ node_name }}"
    namespace: "{{ ocp_namespace }}"
  register: clone_status
  until: clone_status.resources[0].status.phase | default('') == 'Succeeded'
  retries: 60
  delay: 30
  failed_when: clone_status.resources[0].status.phase | default('') == 'Failed'

- name: Render cloud-init user-data and network-config for this node
  ansible.builtin.set_fact:
    cloudinit_userdata: "{{ lookup('template', 'cloudinit_userdata.j2') }}"
    cloudinit_networkconfig: "{{ lookup('template', 'cloudinit_networkconfig.j2') }}"

- name: Create cloud-init secret for this node
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "cloudinit-{{ node_name }}"
        namespace: "{{ ocp_namespace }}"
      type: Opaque
      stringData:
        userdata: "{{ cloudinit_userdata }}"
        networkdata: "{{ cloudinit_networkconfig }}"
  no_log: true    # contains passwords from vault

- name: Deploy VirtualMachine CR for this node
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'vm_manifest.j2') | from_yaml }}"

- name: Wait for VirtualMachineInstance to reach Running phase
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ node_name }}"
    namespace: "{{ ocp_namespace }}"
  register: vmi_status
  until: vmi_status.resources[0].status.phase | default('') == 'Running'
  retries: 40
  delay: 30
  failed_when: vmi_status.resources[0].status.phase | default('') == 'Failed'

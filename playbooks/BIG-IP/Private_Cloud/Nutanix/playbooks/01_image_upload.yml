---
# playbooks/01_image_upload.yml
# Mounts CIFS share on bastion, then streams the QCOW2 to the
# Nutanix Image Service via Prism Central REST API.
# Idempotent — skips upload if the image already exists and is ACTIVE.

- name: Upload F5 QCOW2 image to Nutanix Image Service
  hosts: localhost
  gather_facts: false
  roles:
    - role: nutanix_image_upload

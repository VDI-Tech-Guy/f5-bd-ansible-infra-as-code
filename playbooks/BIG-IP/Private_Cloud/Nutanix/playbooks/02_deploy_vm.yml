---
# playbooks/02_deploy_vm.yml
# Creates cloud-init ISO via Prism Central, then deploys both VMs.
# Deploys primary first, then secondary — Nutanix VM Anti-Affinity
# policy (if configured) ensures they land on separate AHV hosts.

- name: Deploy F5 BIG-IP VMs on Nutanix AHV
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Deploy primary node ({{ f5_primary_node }})
      ansible.builtin.include_role:
        name: f5_vm_deploy
      vars:
        node_name: "{{ f5_primary_node }}"

    - name: Deploy secondary node ({{ f5_secondary_node }})
      ansible.builtin.include_role:
        name: f5_vm_deploy
      vars:
        node_name: "{{ f5_secondary_node }}"

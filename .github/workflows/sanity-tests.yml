---
name: Sanity tests

on:
  push:
    branches: [main]
  pull_request:
    branches: ["main"]

jobs:
  sanity-tests:
    runs-on: ubuntu-latest

    env:
      ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN: ${{ secrets.AH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: ansible-galaxy collection install . -vvv

      - name: Install ansible-test
        run: pip install ansible-core

      - name: Run sanity tests
        run: ansible-test sanity --docker
---
name: Sanity tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["main"]

jobs:
  sanity-tests:
    uses: ansible-network/github_actions/.github/workflows/sanity.yml@main
    secrets:
      ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN: ${{ secrets.AH_TOKEN }}
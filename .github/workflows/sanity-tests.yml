---
name: Sanity tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches: ["main"]

jobs:
  sanity:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ansible-version:
          - stable-2.16
          - stable-2.17
          - stable-2.18
          - stable-2.19
          - stable-2.20
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    name: "py${{ matrix.python-version }} / ${{ matrix.ansible-version }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Automation Hub token into ansible.cfg
        run: |
          sed -i '/\[galaxy_server.automation_hub\]/a token=${{ secrets.AH_TOKEN }}' ansible.cfg

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ansible-core (${{ matrix.ansible-version }})
        run: python3 -m pip install https://github.com/ansible/ansible/archive/${{ matrix.ansible-version }}.tar.gz --disable-pip-version-check

      - name: Install collection dependencies
        run: ansible-galaxy collection install -r requirements.yml -p /home/runner/.ansible/collections
        if: hashFiles('requirements.yml') != ''

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Install collection
        run: ansible-galaxy collection install ./f5networks-f5_infra_as_code_deployments-1.0.0.tar.gz --pre -p /home/runner/.ansible/collections

      - name: Print the ansible version
        run: ansible --version

      - name: Print the python dependencies
        run: python3 -m pip list

      - name: Run sanity tests
        run: ansible-test sanity --requirements --color --python ${{ matrix.python-version }}
        working-directory: /home/runner/.ansible/collections/ansible_collections/f5networks/f5_infra_as_code_deployments